<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RE:ZEN | Roblox Animator</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Syne+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- (tvůj CSS nechávám beze změny) -->
</head>

<body>

<audio id="sfx" src="https://assets.mixkit.co/sfx/preview/mixkit-sci-fi-click-900.mp3" preload="auto"></audio>

<!-- NAV FIX -->
<nav id="navbar">
    <a href="#" class="logo">
        RE:<span class="logo-accent">ZEN</span>
        <div class="roblox-chip">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Roblox_Logo_2022_icon.svg/150px-Roblox_Logo_2022_icon.svg.png">
            ROBLOX
        </div>
    </a>

    <div class="nav-right">
        <ul class="nav-links">
            <li><a href="#portfolio">Showreel</a></li>
            <li><a href="#blog">DevLog</a></li>
        </ul>
        <button class="nav-cta" type="button" onclick="openModal()">Hire Me</button>
    </div>
</nav>

<!-- HERO -->
<header class="hero">
    <h1 class="hero-name">
        <span>RE:</span>
        <span class="line-2">ZEN</span>
    </h1>

    <div class="hero-cta">
        <button class="btn-primary" onclick="openModal()">Hire Me</button>
        <button class="btn-secondary" onclick="scrollToWork()">↓ View Work</button>
    </div>
</header>

<!-- PORTFOLIO -->
<section id="portfolio">
    <h2>Work</h2>

    <video controls loop loading="lazy">
        <source src="./videos/crouch.mp4" type="video/mp4">
    </video>
</section>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="overlayClick(event)">
    <div class="modal-box">
        <button onclick="closeModal()">X</button>

        <form id="contactForm">
            <input id="name" placeholder="Name / Discord" required>
            <textarea id="msg" placeholder="Message" required></textarea>
            <button type="submit">Send</button>
        </form>

        <div id="success" style="display:none;">Sent ✅</div>
    </div>
</div>

<script>
/* ======================
   CURSOR (SAFE VERSION)
====================== */
if (window.matchMedia("(pointer:fine)").matches) {
    document.body.style.cursor = "none";
}

/* ======================
   PARTICLES (FIXED)
====================== */
const canvas = document.createElement("canvas");
document.body.appendChild(canvas);
const ctx = canvas.getContext("2d");

let particles = [];

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

for(let i=0;i<40;i++){
    particles.push({
        x: Math.random()*innerWidth,
        y: Math.random()*innerHeight,
        vx: (Math.random()-0.5)*0.3,
        vy: (Math.random()-0.5)*0.3
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        p.x+=p.vx;
        p.y+=p.vy;

        if(p.x<0)p.x=canvas.width;
        if(p.x>canvas.width)p.x=0;
        if(p.y<0)p.y=canvas.height;
        if(p.y>canvas.height)p.y=0;

        ctx.fillRect(p.x,p.y,2,2);
    });

    requestAnimationFrame(draw);
}
draw();

/* ======================
   NAV SCROLL
====================== */
addEventListener("scroll",()=>{
    navbar.classList.toggle("scrolled", scrollY > 50);
});

/* ======================
   SCROLL
====================== */
function scrollToWork(){
    document.getElementById("portfolio").scrollIntoView({behavior:"smooth"});
}

/* ======================
   MODAL
====================== */
function openModal(){
    modal.classList.add("active");
}
function closeModal(){
    modal.classList.remove("active");
}
function overlayClick(e){
    if(e.target.id === "modal") closeModal();
}
addEventListener("keydown", e=>{
    if(e.key === "Escape") closeModal();
});

/* ======================
   FORM (SAFE)
====================== */
document.getElementById("contactForm").addEventListener("submit", e=>{
    e.preventDefault();

    // ❗ webhook sem NEDÁVEJ → backend only
    document.getElementById("contactForm").style.display="none";
    document.getElementById("success").style.display="block";

    const audio = document.getElementById("sfx");
    audio.play().catch(()=>{});
});

/* ======================
   REVEAL (OPTIMIZED)
====================== */
const observer = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
        if(e.isIntersecting){
            e.target.classList.add("visible");
            observer.unobserve(e.target);
        }
    });
});

document.querySelectorAll(".reveal").forEach(el=>{
    observer.observe(el);
});
</script>

</body>
</html>
